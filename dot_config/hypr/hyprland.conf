#
# Please note not all available settings / options are set here.
# See https://wiki.hyprland.org/Configuring/
monitor=,preferred,auto,auto
monitor=eDP-1,preferred,auto,1.0

# ── Startup ───────────────────────────────────────────────────────────────────
exec-once = uwsm finalize
exec-once = uwsm app -s b -- shikane
exec-once = uwsm app -s b -- xsettingsd
exec-once = uwsm app -s b -- hyprland-battery --monitor
exec-once = uwsm app -s b -- /usr/lib/policykit-1-gnome/polkit-gnome-authentication-agent-1
exec-once = awww-daemon && awww img ~/images/ryan-lum-1ak3Z7ZmtQA-unsplash.jpg
exec-once = uwsm app -s b -- xsetroot -cursor_name left_ptr
exec-once = uwsm app -s b -- nwg-look -a

ecosystem {
    no_update_news = yes
    no_donation_nag = yes
}

# ── Input ─────────────────────────────────────────────────────────────────────
input {
    kb_layout = us,hu,de
    kb_options = grp:alt_space_toggle
    kb_variant = altgr-intl,qwerty,qwerty
    kb_model =
    kb_rules =

    follow_mouse = 2
    float_switch_override_focus = 0

    repeat_rate = 30
    repeat_delay = 350

    touchpad {
        natural_scroll = yes
        #clickfinger_behavior = true
        drag_lock = 2
        tap-and-drag = yes
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

cursor {
    no_warps = true
    hotspot_padding = 0
}

# ── Appearance ────────────────────────────────────────────────────────────────
general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    gaps_in = 2
    gaps_out = 2
    border_size = 1

    col.active_border = rgba(8fbcbbee) rgba(5e81acee) 45deg
    col.inactive_border = rgba(3b4252aa)

    #layout = dwindle
    layout = scrolling

    resize_on_border = true
    allow_tearing = true

    snap {
        enabled = true
    }
}

misc {
    font_family = Inter Variable
    disable_hyprland_guiutils_check = true
    disable_hyprland_logo = true

    #enable_swallow = true
    #swallow_regex = ^(foot|footclient)$

    mouse_move_enables_dpms = true
    key_press_enables_dpms = true

    focus_on_activate = true
    mouse_move_focuses_monitor = false

    on_focus_under_fullscreen = 2
    initial_workspace_tracking = false

    vfr = true
    vrr = false
}

decoration {
    rounding_power = 2.4
    rounding = 6

    blur {
        enabled = yes
        size = 6
        passes = 1
        new_optimizations = on

        brightness = 1
        noise = 0.05
        contrast = 0.89
        vibrancy = 0.5
        vibrancy_darkness = 0.5

        popups = false
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    }

    inactive_opacity = 0.94
    active_opacity = 1.00

    shadow {
        enabled = yes
        range = 4
        render_power = 2
        color = rgba(1a1a1aee)
    }
    dim_inactive = true
    dim_strength = 0.05
    dim_special = 0.08
}

animations {
    enabled = yes
    # Curves
    bezier = emphasizedDecel, 0.05, 0.7, 0.1, 1
    bezier = emphasizedAccel, 0.3, 0, 0.8, 0.15
    bezier = standardDecel, 0, 0, 0, 1
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.52, 0.03, 0.72, 0.08

    animation = fadeDim, 1, 4, emphasizedDecel
    animation = fadeDpms, 1, 9, emphasizedDecel
    animation = monitorAdded, 1, 5, emphasizedDecel

    # windows
    animation = windowsIn, 1, 5, emphasizedDecel, popin 80%
    animation = fadeIn, 1, 5, emphasizedDecel
    animation = windowsOut, 1, 4, emphasizedAccel, slidefade 80%
    animation = fadeOut, 1, 4, emphasizedAccel
    animation = windowsMove, 1, 4, emphasizedDecel, slide

    # layers
    animation = layersIn, 1, 3, emphasizedDecel, popin 93%
    animation = layersOut, 1, 3, menu_decel, popin 94%

    animation = border, 1, 4, standardDecel                                                     
    animation = borderangle, 1, 5, standardDecel                                                
    # workspaces
    animation = workspaces, 1, 3, default, slidefade 20%
    animation = specialWorkspaceIn, 1, 4, emphasizedDecel, slidevert 40%
    animation = specialWorkspaceOut, 1, 3, emphasizedAccel, slidevert 40%
}

# ── Layouts ───────────────────────────────────────────────────────────────────
dwindle {
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
    #no_gaps_when_only = true
    #swapsplit = true
    special_scale_factor = 0.92
}

scrolling {
    direction = right
}

# ── Gestures ──────────────────────────────────────────────────────────────────
gesture = 3, swipe, move,
gesture = 3, pinch, float
gesture = 4, horizontal, workspace
#gesture = 4, up, dispatcher, global, quickshell:overviewWorkspacesToggle
#gesture = 4, down, dispatcher, global, quickshell:overviewWorkspacesClose
gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

# ── Misc config ───────────────────────────────────────────────────────────────
binds {
    drag_threshold = 10
    scroll_event_delay = 200

    allow_pin_fullscreen = true
    hide_special_on_workspace_change = true
}

debug {
    overlay = false
    damage_blink = false
    disable_logs = true
    enable_stdout_logs = true
}

xwayland {
    use_nearest_neighbor = false
}

# ── Plugins ───────────────────────────────────────────────────────────────────
plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1

        enable_gesture = true # laptop touchpad, 4 fingers
        #gesture_distance = 300 # how far is the "max"
        #gesture_positive = true # positive = swipe down. Negative = swipe up.
    }
}

# ── Keybinds ──────────────────────────────────────────────────────────────────
# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Passthrough submap
bind = $mainMod, Pause, submap, clean
submap = clean
bind = $mainMod, Pause, submap, reset
submap = reset

# Resize submap
bind = $mainMod, R, submap, resize
submap = resize
binde = , h, resizeactive, 10 0
binde = , l, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
bind = , escape, submap, reset
bind = , Return, submap, reset
bind = , bracketleft, layoutmsg, colresize -0.05
bind = , bracketright, layoutmsg, colresize +0.05
bind = , 0, layoutmsg, colresize all 0.5
submap = reset

# Scrolling Fit submap
bind = $mainMod, W, submap, fit
submap = fit, reset
bind = , a, layoutmsg, fit active
bind = , r, layoutmsg, fit all
bind = , v, layoutmsg, fit visible
bind = , b, layoutmsg, fit tobeg
bind = , e, layoutmsg, fit toend
bind = , escape, submap, reset
bind = , return, submap, reset
submap = reset

# ── Launchers ─────────────────────────────────────────────────────────────────
bind = $mainMod, Return, exec, footclient
bind = $mainMod, D, exec, ~/bin/launcher
bind = CTRL ALT, L, exec, hyprlock
bind = $mainMod, C, exec, ~/bin/clipboard
bind = $mainMod, V, exec, ~/bin/zed-open /SAPDevelop/work/
bind = $mainMod, N, exec, ~/.local/bin/dunstctl close-all

# ── Window management ─────────────────────────────────────────────────────────
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, P, pin, # dwindle
#bind = $mainMod SHIFT, P, pseudo, # dwindle
bind = $mainMod, Space, layoutmsg, togglesplit, # dwindle
bind = $mainMod SHIFT, Space, togglefloating,
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod SHIFT, E, exec, uwsm stop
bind = $mainMod SHIFT, C, forcerendererreload,

# ── Scratchpad / special workspace ────────────────────────────────────────────
bind = $mainMod, S, exec, scratchpad
bind = $mainMod SHIFT, S, exec, scratchpad -g
bind = $mainMod, grave, togglespecialworkspace,
bind = $mainMod SHIFT, grave, movetoworkspace, special

# ── Screenshots ───────────────────────────────────────────────────────────────
bind = , Print, exec, bash -x ~/bin/hyprgrim save active
bind = SHIFT, Print, exec, ~/bin/hyprgrim save output | notify-send -t 'screenshot'
bind = CTRL, Print, exec, ~/bin/hyprgrim save area - | swappy -f -
bind = ALT, Print, exec, ~/bin/hyprgrim save area - | tesseract - - | wl-copy

# ── Scrolling layout ──────────────────────────────────────────────────────────
bind = $mainMod SHIFT, P, layoutmsg, promote
bind = $mainMod SHIFT, comma, layoutmsg, swapcol l
bind = $mainMod SHIFT, period, layoutmsg, swapcol r
bind = $mainMod CTRL, comma, layoutmsg, movecoltoworkspace +1
bind = $mainMod CTRL, period, layoutmsg, movecoltoworkspace -1

# ── Navigation ────────────────────────────────────────────────────────────────
# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, h, layoutmsg, focus l
bind = $mainMod, l, layoutmsg, focus r
#bind = $mainMod, h, movefocus, l # dwindle
#bind = $mainMod, l, movefocus, r # dwindle
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Swap
bind = $mainMod CTRL, h, layoutmsg, swapcol l
bind = $mainMod CTRL, l, layoutmsg, swapcol r
#bind = $mainMod CTRL, h, swapwindow, l # dwindle
#bind = $mainMod CTRL, l, swapwindow, r # dwindle
bind = $mainMod CTRL, k, swapwindow, u
bind = $mainMod CTRL, j, swapwindow, d

# Move window
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Move workspace to monitor
bind = $mainMod ALT, h, movecurrentworkspacetomonitor, l
bind = $mainMod ALT, l, movecurrentworkspacetomonitor, r
bind = $mainMod ALT, j, movecurrentworkspacetomonitor, d
bind = $mainMod ALT, k, movecurrentworkspacetomonitor, u

# ── Workspaces ────────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── System / media ────────────────────────────────────────────────────────────
bindld = Super+Shift, <F4>, Suspend system, exec, sudo systemctl suspend || loginctl suspend
#bindl = , switch:on:Lid Switch, exec, sudo systemctl suspend || loginctl suspend
#bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor eDP-1,disable
#bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor eDP-1,preferred,preferred,1.0

bindle = , XF86MonBrightnessUp, exec, brightnessctl -q s +5%
bindle = , XF86MonBrightnessDown, exec, brightnessctl -q s 5%-

bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

#bindl = , XF86AudioStop, exec, playerctl stop
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

#bind = $mainMod, Tab, hyprexpo:expo, toggle

# ── Layer rules ───────────────────────────────────────────────────────────────
layerrule = match:namespace hyprpicker, no_anim on
layerrule = match:namespace launcher, dim_around on, blur on, no_anim on

# ── Window rules ──────────────────────────────────────────────────────────────

# Global
windowrule = match:class ^()$, match:title ^()$, no_blur on
windowrule = match:float 0, no_shadow on
windowrule = match:float yes, persistent_size on

# XWayland
windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}
windowrule=match:xwayland true, float on

# Slack
windowrule=match:class com.slack.Slack, workspace special
windowrule=match:class com.slack.Slack, opacity 0.90

# Float-only apps
windowrule=float on, match:class ^(adriconf|dconf-editor|kvantum.*|modem-manager-gui|nm-connection-editor|seahorse|com.github.tchx84.Flatseal|io.github.ebonjaeger.bluejay)$
windowrule=float on, match:class ^(eog|evince|org.pwmt.zathura|com.stremio.Stremio)$
windowrule=float on, match:class ^([Ii]wgtk|org.twosheds.iwgtk|pavucontrol|com.saivert.pwvucontrol|hyprpwcenter|hyprland-share-picker)$
windowrule=float on, match:class ^(file-roller|gedit|[Kk]eybase|Standard Notes|XEyes)$
windowrule=float on, match:class ^(gnome-.*|org.gnome.*|org.kde.*)$

# Sized floats
windowrule=match:class ^(gnome-calculator|org.gnome.Calculator)$, float on, size (monitor_w*0.23) (monitor_h*0.32), move (monitor_w*0.4) (monitor_h*0.2)
windowrule=match:class ^(org.gnome.Nautilus|org.kde.dolphin)$, float on, size (monitor_w*0.6) (monitor_h*0.5), move (monitor_w*0.1) (monitor_h*0.1)
windowrule=match:class ^(mpv|imv)$, float on, size (monitor_w*0.6) (monitor_h*0.53), move (monitor_w*0.2) (monitor_h*0.1)
windowrule=match:class ^(bluetui|wiremix|yazi)$, float on, size (monitor_w*0.6) (monitor_h*0.5), move (monitor_w*0.2) (monitor_h*0.1)
windowrule=match:class waypaper, float on

windowrule=match:class ^microsoft-edge$, persistent_size off
windowrule=match:class ^msedge-.*$, persistent_size off

# Zoom (native .deb — class: Zoom)
windowrule = match:class ^Zoom$, float on
windowrule = match:class ^Zoom$, suppress_event activate
windowrule = match:class ^Zoom$, persistent_size off
# Main meeting window
windowrule = match:class ^Zoom$, match:initial_title ^Zoom Workplace$, size 1230 723, content video, center on
# Sharing toolbar — top center, pinned above other windows
windowrule = match:class ^Zoom$, match:initial_title ^as_toolbar$, move (monitor_w*0.5-387) (40), pin on, no_blur on, no_initial_focus on
# Self-view floating video — bottom right
windowrule = match:class ^Zoom$, match:initial_title ^zoom_linux_float_video_window$, content video, size 212 155, move (monitor_w-222) (monitor_h-195), pin on, no_initial_focus on
# Popups
windowrule = no_initial_focus on, match:class ^Zoom$, match:initial_title ^zoom_linux_float_message_reminder$

# Steam
windowrule=float on, match:class (steam|gamescope|zenity)
windowrule=match:title ^$, match:class steam, min_size 1 1, stay_focused on

# Firefox
windowrule=float on, match:class ^firefox(-nightly)?$, match:title ^Extension: .*$
windowrule=float on, size 750 350, match:class ^firefox(-nightly)?$, match:title ^(About Mozilla Firefox|About Firefox Nightly)$
windowrule {
    name = firefox-pip
    float = on
    border_size = 0
    #size = (monitor_w*0.25) (monitor_h*0.23)
    keep_aspect_ratio = on
    match:class = ^firefox(-nightly)?$
    match:initial_title = ^Picture-in-Picture$
}

# GTK file dialogs
windowrule=match:title ^Open (File|Folder)$, float on, size (monitor_w*0.5) (monitor_h*0.65)
windowrule=match:class xdg-desktop-portal-gtk, float on, size (monitor_w*0.5) (monitor_h*0.65)

