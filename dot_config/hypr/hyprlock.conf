# --- Colors ---
$accent       = rgba(4, 209, 249, 1.0)
$accent_dim   = rgba(4, 209, 249, 0.4)
$lavender     = rgba(180, 140, 255, 1.0)
$lavender_dim = rgba(180, 140, 255, 0.4)
$text         = rgba(235, 250, 250, 1.0)
$text_dim     = rgba(235, 250, 250, 0.5)
$card         = rgba(30, 30, 46, 0.55)
$card_border  = rgba(80, 80, 120, 0.25)
$surface      = rgba(50, 52, 73, 0.8)
$red          = rgba(241, 108, 117, 1.0)
$red_dim      = rgba(241, 108, 117, 0.6)
$green        = rgba(4, 209, 150, 1.0)
$shadow       = rgba(0, 0, 0, 0.6)

$font = Inter

# --- General ---
general {
    hide_cursor = true
    immediate_render = true
    ignore_empty_input = true
}

# --- Auth ---
auth {
    fingerprint {
        enabled = true
        ready_message = Touch sensor to unlock
        present_message = Scanning...
        retry_delay = 500
    }

    pam {
        enabled = true
    }
}

# --- Animations ---
animations {
    enabled = true

    bezier = smooth, 0.05, 0.9, 0.1, 1.0
    bezier = smoothIn, 0.25, 1.0, 0.5, 1.0
    bezier = smoothOut, 0.36, 0, 0.66, -0.56

    animation = fadeIn, 1, 5, smoothIn
    animation = fadeOut, 1, 3, smoothOut
    animation = inputFieldDots, 1, 3, smooth
    animation = inputFieldColors, 1, 4, smooth
    animation = inputFieldFade, 1, 3, smooth
}

# --- Background ---
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 6
    noise = 0.02
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.15
}

# --- Greeting ---
label {
    monitor =
    text = Welcome back
    color = $text_dim
    font_size = 14
    font_family = $font

    shadow_passes = 1
    shadow_size = 3
    shadow_color = $shadow

    position = 0, 170
    halign = center
    valign = center
    zindex = 2
}

# --- Time ---
label {
    monitor =
    text = $TIME
    color = $text
    font_size = 72
    font_family = $font

    shadow_passes = 2
    shadow_size = 6
    shadow_color = $shadow
    shadow_boost = 1.3

    position = 0, 110
    halign = center
    valign = center
    zindex = 2
}

# --- Date ---
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = $text_dim
    font_size = 16
    font_family = $font

    shadow_passes = 1
    shadow_size = 3
    shadow_color = $shadow

    position = 0, 55
    halign = center
    valign = center
    zindex = 2
}

# --- Divider ---
shape {
    monitor =
    size = 280, 0
    border_size = 1
    border_color = $accent_dim $lavender_dim 90deg

    position = 0, 20
    halign = center
    valign = center
    zindex = 2
}

# --- Input field ---
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    rounding = 14

    outer_color = $accent_dim $lavender_dim 45deg
    inner_color = $surface
    font_color = $text
    check_color = $green $accent 120deg
    fail_color = $red $red_dim 40deg
    capslock_color = rgba(250, 190, 80, 0.8)

    fade_on_empty = false
    font_family = $font
    placeholder_text = <i>Password...</i>
    fail_text = <i>$FAIL</i>
    dots_size = 0.22
    dots_spacing = 0.35
    dots_center = true

    shadow_passes = 2
    shadow_size = 8
    shadow_color = $shadow
    shadow_boost = 1.2

    position = 0, -40
    halign = center
    valign = center
    zindex = 2
}

# --- Fingerprint hint ---
label {
    monitor =
    text = $FPRINTPROMPT
    color = $text_dim
    font_size = 11
    font_family = $font

    position = 0, -90
    halign = center
    valign = center
    zindex = 2
}

# --- Weather ---
label {
    monitor =
    text = cmd[update:18000000] curl -s 'wttr.in/Vienna?format=%t+(%f)' | tr -d '+'
    color = $text_dim
    font_size = 13
    font_family = $font

    shadow_passes = 1
    shadow_size = 3
    shadow_color = $shadow

    position = 0, 40
    halign = center
    valign = bottom
    zindex = 2
}
