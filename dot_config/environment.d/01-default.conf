SHELL=/usr/bin/fish
EDITOR=/usr/bin/nvim
#PAGER=/bin/less
#LESS="FgiMRSwXz-4"

RUSTC_WRAPPER=$HOME/.cargo/bin/sccache
XDG_CONFIG_HOME=$HOME/.config
XDG_DOWNLOAD_DIR=$HOME/downloads
XDG_DOCUMENTS_DIR=$HOME/docs
XDG_PICTURES_DIR=$HOME/images

XDG_DATA_HOME=$HOME/.local/share
XDG_STATE_HOME=$HOME/.local/state
XDG_CACHE_HOME=$HOME/.cache

#SYSTEMD_DEBUGGER=lldb
DOCKER_BUILDKIT=1

GOPATH=$XDG_CACHE_HOME/go
MYCFLAGS="-march=native -fivopts -fmodulo-sched"
CUDA_CACHE_PATH="$XDG_CACHE_HOME"/nv
LESSHISTFILE="$XDG_STATE_HOME"/less/history
WORKON_HOME="$XDG_DATA_HOME/virtualenvs"
DOCKER_CONFIG="$XDG_CONFIG_HOME"/docker
TS_NODE_HISTORY=$XDG_STATE_HOME/ts_node_repl_history
RUSTUP_HOME=$XDG_DATA_HOME/rustup
BUNDLE_USER_CONFIG="$XDG_CONFIG_HOME"/bundle
BUNDLE_USER_CACHE="$XDG_CACHE_HOME"/bundle
BUNDLE_USER_PLUGIN="$XDG_DATA_HOME"/bundle
RBENV_ROOT="$XDG_DATA_HOME"/rbenv
PSQL_HISTORY="$XDG_DATA_HOME/psql_history"
_JAVA_OPTIONS=-Djava.util.prefs.userRoot="$XDG_CONFIG_HOME"/java
NPM_CONFIG_USERCONFIG="$XDG_CONFIG_HOME"/npm/npmrc
NODE_REPL_HISTORY="$XDG_DATA_HOME"/node_repl_history
MINIKUBE_HOME="$XDG_DATA_HOME"/minikube
K9SCONFIG="$XDG_CONFIG_HOME"/k9s
GNUPGHOME="$XDG_DATA_HOME"/gnupg
SSH_AUTH_SOCK=$XDG_RUNTIME_DIR/gcr/ssh
