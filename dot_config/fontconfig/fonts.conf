<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
	<alias>
		<family>serif</family>
        <prefer>
            <family>Input Serif</family>
            <family>Liberation Serif</family>
            <family>AnonymicePro Nerd Font</family>
        </prefer>
	</alias>
	<alias>
		<family>sans-serif</family>
        <prefer>
            <family>Inter Variable</family>
            <family>AnonymicePro Nerd Font</family>
        </prefer>
	</alias>
	<alias>
		<family>sans</family>
        <prefer>
            <family>Inter Variable</family>
            <family>AnonymicePro Nerd Font</family>
        </prefer>
	</alias>
	<alias>
		<family>monospace</family>
        <prefer>
            <family>Source Code Pro</family>
            <family>AnonymicePro Nerd Font</family>
        </prefer>
	</alias>
	<alias>
		<family>ui-monospace</family>
        <prefer>
            <family>Fantasque Sans Mono</family>
            <family>AnonymicePro Nerd Font</family>
        </prefer>
	</alias>
    <alias>
        <family>cursive</family>
        <prefer>
            <family>Comic Neue</family>
        </prefer>
    </alias>
    <alias binding="strong">
        <family>system-ui</family>
        <prefer><family>Inter</family></prefer>
    </alias>
    <match target="font">
        <edit name="antialias" mode="assign">
            <bool>true</bool>
        </edit>
        <edit name="hinting" mode="assign">
            <bool>true</bool>
        </edit>
        <edit name="hintstyle" mode="assign">
            <const>hintslight</const>
        </edit>
        <edit name="rgba" mode="assign">
            <const>none</const>
        </edit>
        <edit name="autohint" mode="assign">
            <bool>true</bool>
        </edit>
        <edit name="lcdfilter" mode="assign">
            <const>lcdnone</const>
        </edit>
        <!--
        <edit name="dpi" mode="assign">
            <double>96</double>
        </edit>
        -->
	</match>
    <match target="font">
        <test name="weight" compare="more">
            <const>medium</const>
        </test>
        <edit name="autohint" mode="assign">
            <bool>false</bool>
        </edit>
    </match>
    <match>
        <test compare="contains" name="lang">
            <string>en</string>
        </test>
        <test name="family">
            <string>cursive</string>
        </test>
        <edit mode="delete_all" name="lang"/>
        <edit mode="prepend" name="family">
            <string>Comic Neue</string>
        </edit>
    </match>
    <!-- fuck helvetica -->
    <match>
        <test name="family">
            <string>Helvetica</string>
        </test>
        <edit binding="same" mode="assign" name="family">
            <string>sans-serif</string>
        </edit>
    </match>
    <!-- fuck calibri -->
    <match>
        <test name="family">
            <string>Calibri</string>
        </test>
        <edit binding="same" mode="assign" name="family">
            <string>sans-serif</string>
        </edit>
    </match>
    <!-- fuck comic sans -->
    <match>
        <test name="family">
            <string>Comic Sans</string>
        </test>
        <edit binding="same" mode="assign" name="family">
            <string>cursive</string>
        </edit>
    </match>
</fontconfig>
